# pyproject.toml — project configuration for pytest and ruff.
#
# WHY this file exists
# --------------------
# Previously there was no test configuration at all. This file tells:
#   - pytest where to find tests and how to run them
#   - ruff (linter) what rules to enforce and what to ignore

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -q"
asyncio_mode = "auto"

[tool.pytest-watch]
# pytest-watch re-runs tests automatically when source files change.
# Run with: ptw  (or: ptw tests/unit/ for a specific directory)
runner = "pytest"
nobeep = true

[tool.ruff]
# Target Python version — must match the Dockerfile base image
target-version = "py311"
line-length = 120

[tool.ruff.lint]
# Rules enabled:
#   E, W: pycodestyle (style errors)
#   F:    pyflakes (undefined names, unused imports)
#   I:    isort (import ordering)
#   UP:   pyupgrade (use modern Python syntax)
#   B:    flake8-bugbear (common bug patterns)
select = ["E", "W", "F", "I", "UP", "B"]
# Rules ignored:
#   E501: line too long (ruff format handles this)
#   B008: function calls in default arguments (FastAPI uses this pattern legitimately)
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
# Test files can use assert statements freely
"tests/**" = ["S101"]
