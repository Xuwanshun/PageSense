# ── .github/workflows/deploy.yml ─────────────────────────────────────────────
# Continuous Deployment (CD) workflow.
#
# WHAT IS CD?
# ───────────
# CD automatically deploys your app to AWS whenever CI passes on the main branch.
# "Continuous" means every push to main = a new deploy. No manual steps.
#
# This workflow:
#   1. Builds the full Docker image (all stages, including model download)
#   2. Pushes it to ECR
#   3. Updates the ECS service to use the new image
#   4. Waits for ECS to finish rolling out the new version
#   5. Smoke tests the deployment by calling /health
#
# WHEN DOES IT RUN?
#   Only on push to main branch, AND only after CI (lint + test + build-check)
#   passes. You can't deploy broken code.
#
# HOW ROLLBACK WORKS:
#   If the new container is unhealthy, ECS automatically keeps the old
#   container running (it won't stop until the new one passes health checks).
#   To manually rollback, re-deploy a previous image tag:
#     aws ecs update-service --cluster CLUSTER --service SERVICE \
#       --task-definition FAMILY:PREVIOUS_VERSION
#
# REQUIRED GITHUB SECRETS (Settings → Secrets and variables → Actions → New secret):
# ┌──────────────────────────┬─────────────────────────────────────────────────┐
# │ Secret name              │ Where to get the value                          │
# ├──────────────────────────┼─────────────────────────────────────────────────┤
# │ AWS_ACCESS_KEY_ID        │ IAM user with deploy permissions (see below)    │
# │ AWS_SECRET_ACCESS_KEY    │ IAM user                                        │
# │ AWS_REGION               │ e.g. ca-central-1                               │
# │ ECR_REPOSITORY_URI       │ cdk deploy output: RagAgentApp.EcrRepositoryUri │
# │ ECS_CLUSTER_NAME         │ cdk deploy output: RagAgentApp.EcsClusterName   │
# │ ECS_SERVICE_NAME         │ cdk deploy output: RagAgentApp.EcsServiceName   │
# └──────────────────────────┴─────────────────────────────────────────────────┘
#
# HOW TO CREATE THE IAM USER FOR GITHUB ACTIONS:
#   1. AWS Console → IAM → Users → Create user (name: github-actions-deploy)
#   2. Attach these managed policies:
#        AmazonEC2ContainerRegistryPowerUser   (ECR push)
#        AmazonECS_FullAccess                  (ECS deploy)
#        ElasticLoadBalancingReadOnly          (smoke test ALB lookup)
#   3. Create access key → paste into GitHub secrets
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]

# Only one deployment can run at a time.
# If you push twice quickly, the second run waits for the first to finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Re-run CI checks before deploying ─────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install "ruff==0.15.11"
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip, cache-dependency-path: requirements-dev.txt }
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/unit/ -q
        env:
          OPENAI_API_KEY: "sk-fake-ci-key"

  # ── Build and deploy ────────────────────────────────────────────────────────
  deploy:
    name: Build, push, and deploy to ECS
    runs-on: ubuntu-latest  # x86_64 runner — image targets x86 ECS
    needs: [lint, test]     # only deploy if lint + test passed

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # ── AWS Authentication ─────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── ECR Login ─────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Docker Build + Push ────────────────────────────────────────────────
      # Plain docker build/push instead of buildx — avoids credential plumbing
      # issues where buildx's internal daemon doesn't inherit the ECR login.
      # Uses the previous :latest image as a cache source so only changed
      # layers are rebuilt.
      - name: Build and push Docker image to ECR
        id: build-push
        run: |
          docker pull ${{ secrets.ECR_REPOSITORY_URI }}:latest || true
          docker build \
            --cache-from ${{ secrets.ECR_REPOSITORY_URI }}:latest \
            -t ${{ secrets.ECR_REPOSITORY_URI }}:${{ github.sha }} \
            -t ${{ secrets.ECR_REPOSITORY_URI }}:latest \
            .
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:${{ github.sha }}
          docker push ${{ secrets.ECR_REPOSITORY_URI }}:latest

      # ── ECS Deploy ────────────────────────────────────────────────────────
      # Derive the task definition family name from the ECS service — no extra
      # secret needed. CDK names the family the same as the service by convention.
      - name: Resolve ECS task definition family
        id: resolve-task-def
        run: |
          FAMILY=$(aws ecs describe-services \
            --cluster "${{ secrets.ECS_CLUSTER_NAME }}" \
            --services "${{ secrets.ECS_SERVICE_NAME }}" \
            --query "services[0].taskDefinition" \
            --output text | sed 's|.*/\([^:]*\):.*|\1|')
          echo "family=${FAMILY}" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ steps.resolve-task-def.outputs.family }}" \
            --query taskDefinition \
            > task-definition.json

      - name: Update task definition with new image tag
        id: update-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: app
          image: ${{ secrets.ECR_REPOSITORY_URI }}:${{ github.sha }}

      - name: Deploy updated task definition to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:             ${{ steps.update-task-def.outputs.task-definition }}
          service:                     ${{ secrets.ECS_SERVICE_NAME }}
          cluster:                     ${{ secrets.ECS_CLUSTER_NAME }}
          # Waits until new task is healthy before marking success.
          # If health checks fail, ECS keeps the old task running (auto-rollback).
          wait-for-service-stability:  true

      # ── Smoke Test ────────────────────────────────────────────────────────
      - name: Smoke test deployed service
        run: |
          ALB_URL=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?contains(LoadBalancerName, 'Rag')].DNSName" \
            --output text)

          echo "Testing http://${ALB_URL}/health"
          curl --fail --silent --show-error --retry 12 --retry-delay 15 --retry-all-errors \
            "http://${ALB_URL}/health"

          echo ""
          echo "Deployment successful! App is live at http://${ALB_URL}"
